<svg xmlns="http://www.w3.org/2000/svg" width="15px" height="20px" viewBox="0 0 15 20">
  <!-- A4: High Vortex Aircraft (e.g., B757) - Distinctive wingtip design -->
  <g fill="rgb(250, 255, 255)" stroke="black" stroke-width="0.8">
    <!-- Fuselage (narrow body) -->
    <path d="M 7.5,0 L 9,6 L 9,14.5 L 7.5,16.5 L 6,14.5 L 6,6 Z" />
    <!-- Wings with emphasized wingtips -->
    <path d="M 0.5,7.5 L 6,7 L 6,10 L 1.5,10.5 L 0.5,9.5 Z" />
    <path d="M 14.5,7.5 L 9,7 L 9,10 L 13.5,10.5 L 14.5,9.5 Z" />
    <!-- Wingtip vortex indicators (winglets) -->
    <path d="M 0.5,7.5 L 0,6.5 L 1,7" stroke-width="1" />
    <path d="M 14.5,7.5 L 15,6.5 L 14,7" stroke-width="1" />
    <!-- Underwing engines -->
    <ellipse cx="3" cy="9" rx="1.2" ry="2.2" />
    <ellipse cx="12" cy="9" rx="1.2" ry="2.2" />
    <!-- Horizontal stabilizer -->
    <rect x="4.5" y="14.5" width="6" height="1.5" />
    <!-- Vertical stabilizer -->
    <path d="M 6.5,14.5 L 7.5,19.5 L 8.5,14.5 Z" />
  </g>
</svg>
