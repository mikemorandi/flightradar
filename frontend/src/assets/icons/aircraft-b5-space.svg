<svg xmlns="http://www.w3.org/2000/svg" width="15px" height="20px" viewBox="0 0 15 20">
  <!-- B5: Space/Experimental - Rocket/Spaceplane -->
  <g fill="rgb(250, 255, 255)" stroke="black" stroke-width="0.8">
    <!-- Nose cone -->
    <path d="M 7.5,0.5 L 9.5,5 L 5.5,5 Z" />
    <!-- Fuselage -->
    <rect x="5.5" y="5" width="4" height="9" />
    <!-- Small delta wings -->
    <path d="M 2,12 L 5.5,10 L 5.5,13 Z" />
    <path d="M 13,12 L 9.5,10 L 9.5,13 Z" />
    <!-- Tail fins -->
    <path d="M 5.5,14 L 3,18 L 5.5,17 Z" />
    <path d="M 9.5,14 L 12,18 L 9.5,17 Z" />
    <!-- Vertical stabilizer -->
    <path d="M 6.5,14 L 7.5,19.5 L 8.5,14 Z" />
    <!-- Exhaust nozzles -->
    <rect x="6" y="17" width="1.2" height="2" />
    <rect x="7.8" y="17" width="1.2" height="2" />
    <!-- Window ports -->
    <circle cx="7.5" cy="7" r="0.6" fill="none" stroke-width="0.5" />
  </g>
</svg>
