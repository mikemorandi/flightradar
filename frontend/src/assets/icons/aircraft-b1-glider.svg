<svg xmlns="http://www.w3.org/2000/svg" width="15px" height="20px" viewBox="0 0 15 20">
  <!-- B1: Glider - Long slender wings, no engine -->
  <g fill="rgb(250, 255, 255)" stroke="black" stroke-width="0.8">
    <!-- Fuselage (very thin) -->
    <path d="M 7.5,1 L 8,8 L 8,16 L 7.5,17.5 L 7,16 L 7,8 Z" />
    <!-- Very long, narrow wings -->
    <path d="M 0.5,8 L 7,7.5 L 7,9.5 L 1,10 Z" />
    <path d="M 14.5,8 L 8,7.5 L 8,9.5 L 14,10 Z" />
    <!-- Small T-tail -->
    <rect x="5.5" y="16.5" width="4" height="0.8" />
    <!-- Vertical stabilizer (tall, thin) -->
    <path d="M 7,16.5 L 7.5,19.5 L 8,16.5 Z" stroke-width="0.6" />
  </g>
</svg>
