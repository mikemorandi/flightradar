<svg xmlns="http://www.w3.org/2000/svg" width="15px" height="20px" viewBox="0 0 15 20">
  <!-- A5: Heavy Aircraft (> 300,000 lbs) - Wide-body jumbo jet -->
  <g fill="rgb(250, 255, 255)" stroke="black" stroke-width="0.8">
    <!-- Fuselage (very wide) -->
    <path d="M 7.5,0 L 10,5 L 10.5,13 L 7.5,16 L 4.5,13 L 5,5 Z" />
    <!-- Wings (large, swept) -->
    <path d="M 0.5,7.5 L 5,6.5 L 5,10.5 L 1.5,12 Z" />
    <path d="M 14.5,7.5 L 10,6.5 L 10,10.5 L 13.5,12 Z" />
    <!-- Four engines (2 per wing) -->
    <ellipse cx="2.5" cy="8.5" rx="1" ry="2" />
    <ellipse cx="4" cy="9" rx="1" ry="1.8" />
    <ellipse cx="11" cy="9" rx="1" ry="1.8" />
    <ellipse cx="12.5" cy="8.5" rx="1" ry="2" />
    <!-- Horizontal stabilizer (wide) -->
    <rect x="3.5" y="13.5" width="8" height="2" />
    <!-- Vertical stabilizer (large) -->
    <path d="M 6,14 L 7.5,19.5 L 9,14 Z" />
  </g>
</svg>
